<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/style_contac.css">
    <title>Contacto - Fauna Chilena</title>
</head>
<body>
    <nav>
        <header>
            <h1>Contacto</h1>
            <p>¿Tienes dudas sobre nuestra fauna? Escríbenos.</p>
        </header>
    </nav>
<main>
    <div class="container-contacto">
        <h2>Formulario de Consultas</h2>
        <form action="#" method="post">
            <div class="form-group">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre..." required>
            </div>
            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.cl" required>
            </div>
            <div class="form-group">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" placeholder="¿En qué podemos ayudarte?"></textarea>
            </div>
            <button type="submit" class="btn-enviar">Enviar Mensaje</button>
            <a href="index.html" class="volver-inicio">⬅️ Volver a la página principal</a>
        </form>
    </div>
</main>
<footer>
    <p>&copy; 2026 Fauna Chilena - Informativo Educativo Inacap</p>
</footer>
</body>
</html>
